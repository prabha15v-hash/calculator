<!DOCTYPE html>
<link rel="stylesheet" href="calculator.css">
<html>
    <title>prabha's calculator</title>
    <center>
        <h1>PRABHA'S  CALCULATOR</h1><br>
    <body>
        <input id="display" placeholder="0"></input><br>
        <button id="1" onclick="change('1')">1</button>
        <button id="2"onclick="change('2')">2</button>
        <button id="3"onclick="change('3')">3</button>
        <button id="4"onclick="change('4')">4</button>
        <button id="5"onclick="change('5')">5</button><br>
        <button id="6"onclick="change('6')">6</button>
        <button id="7"onclick="change('7')">7</button>
        <button id="8"onclick="change('8')">8</button>
        <button id="9" onclick="change('9')">9</button>
        <button id="0" onclick="change(0)">0</button><br>
        <button onclick="adds('+')">+</button>
        <button onclick="subs('-')">-</button>
        <button onclick="muls('*')">*</button>
        <button onclick="divs('/')">/</button>
        <button onclick="equal('=')">=</button><br>
        <button onclick="mod('%')">%</button>
        <button onclick="cl('')">cl</button>
        <button onclick="del('')">de</button><br>
        <button onclick="dot('.')">.</button>

   
    </center>
</html>
<script src="calculator.js"></script>
